name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Build production assets
        if: hashFiles('package.json') != ''
        run: npm run build

      - name: Setup PHP
        if: hashFiles('composer.json') != ''
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-dev --optimize-autoloader

      - name: Create clean build directory
        run: |
          mkdir -p /tmp/gateway
          rsync -av --exclude-from='.distignore' --exclude='.git' ./ /tmp/gateway/

      - name: Create zip from build directory
        run: |
          cd /tmp
          zip -r $GITHUB_WORKSPACE/gateway.zip gateway

      - name: Create GitHub Release (Private Repo)
        uses: softprops/action-gh-release@v1
        with:
          files: gateway.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway
          path: gateway.zip
          retention-days: 30

      # Public release steps
      - name: Push to Public Release Repo
        if: endsWith(github.ref_name, '-public')
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Extract clean version (remove -public suffix)
          VERSION=${GITHUB_REF_NAME%-public}
          
          # Clone public repo
          git clone https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/arcwordpress/gateway-dev.git public-repo
          cd public-repo
          
          # Copy zip
          cp $GITHUB_WORKSPACE/gateway.zip .
          
          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gateway.zip
          git commit -m "Release ${VERSION}"
          git tag ${VERSION}
          git push origin main
          git push origin ${VERSION}
          
          # Create GitHub release in public repo
          gh release create ${VERSION} gateway.zip \
            --title "Release ${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}