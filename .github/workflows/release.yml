name: Package and Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create release zip
        run: |
          mkdir -p /tmp/gateway
          rsync -av --exclude-from='.distignore' --exclude='.git' ./ /tmp/gateway/
          cd /tmp && zip -r $GITHUB_WORKSPACE/gateway.zip gateway

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: gateway.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: gateway
          path: gateway.zip
          retention-days: 30

      - name: Push to Public Release Repo
        if: endsWith(github.ref_name, '-public')
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME%-public}

          git clone https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/arcwordpress/gateway-dev.git public-repo
          cd public-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/arcwordpress/gateway-dev.git

          cp $GITHUB_WORKSPACE/gateway.zip .
          git add gateway.zip
          git diff --cached --quiet || git commit -m "Release ${VERSION}"
          git tag ${VERSION}
          git push -u origin HEAD:main
          git push origin ${VERSION}

          gh release create ${VERSION} gateway.zip \
            --repo arcwordpress/gateway-dev \
            --title "Release ${VERSION}" \
            --generate-notes
